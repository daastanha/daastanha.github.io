<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Story Summaries</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <script src="https://d3js.org/d3.v5.min.js"></script>
    <script src="helpers.js"></script>
    <style>
        .navbar {
            background-color: #f8f9fa;
        }
        .navbar-brand i {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-light">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-book"></i>
            </a>
        </nav>
    </header>
    <div class="container">
        <div class="jumbotron">
            <h2>Story Summary and Notes</h2>
            <p id="content"></p>
        </div>
    </div>

    <script>
        var filename = new URL(window.location.href).searchParams.get("filename");
        d3.text(filename).then(function(data) {
            d3.select('#content').html(data.replaceAll("\n", "<br/>"));
            if (detect_lang_direction(data) === "rtl") {
                document.getElementById('content').style.direction = 'rtl';
            }
        });
    </script>
</body>
</html>
